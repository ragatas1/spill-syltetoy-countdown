/* Snow container overlay */
#snow-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none; /* Allows text clicks through the snow */
    z-index: 9999;
}


/* Individual snowflake design */
.snowflake {
    position: absolute;
    top: -10;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.8;
    animation: fall linear infinite;
}

/* Falling animation keyframes */
@keyframes fall {
    0% {
        transform: translateY(0) translateX(0);
    }
    50% {
        transform: translateY(50vh) translateX(20px);
    }
    100% {
        transform: translateY(105vh) translateX(-20px);
    }
}</style><script role="script" id="twine-user-script" type="text/twine-javascript">/* Snowfall generator in SugarCube */
$(document).on(":passageend", function (ev) {
    // Prevent snow container from duplicating on screen changes
    if ($("#snow-container").length === 0) {
        $(document.body).append('<div id="snow-container"></div>');
    }
    
    var snowContainer = $("#snow-container");
    snowContainer.empty(); // Clear old snow

    var snowCount = 40; // Adjust this number for more/less snow

    for (var i = 0; i < snowCount; i++) {
        var drop = document.createElement('div');
        drop.className = 'snowflake';
        
        // Random properties for natural look
        var size = Math.random() * 5 + 2 + 'px';
        var startLeft = Math.random() * 100 + 'vw';
        var animationDuration = Math.random() * 8 + 7 + 's';
        var animationDelay = Math.random() * -10 + 's';
        var opacity = Math.random() * 0.5 + 0.3;

        $(drop).css({
            'width': size,
            'height': size,
            'left': startLeft,
            'animation-duration': animationDuration,
            'animation-delay': animationDelay,
            'opacity': opacity
        });

        snowContainer.append(drop);
    }
});</script><tw-tag name="dojo" color="green"></tw-tag><tw-tag name="heidis" color="red"></tw-tag><tw-tag name="snow" color="blue"></tw-tag><tw-passagedata pid="1" name="dojo" tags="dojo snow" position="800,450" size="100,100">&amp;gt; be me
